<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>오차율 계산기 (여러 값)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    table { border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #333; padding: 8px 12px; text-align: center; }
    input { width: 100px; padding: 5px; }
    button { margin-top: 15px; padding: 8px 12px; }
  </style>
</head>
<body>
  <h1>오차율 계산기 (여러 값)</h1>
  <p>실험값과 이론값을 각각 입력하세요. 행을 추가할 수 있습니다.</p>

  <table id="dataTable">
    <thead>
      <tr>
        <th>실험값</th>
        <th>이론값</th>
        <th>오차율 (%)</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><input type="number" step="any" class="exp"></td>
        <td><input type="number" step="any" class="theo"></td>
        <td class="result"></td>
      </tr>
    </tbody>
  </table>

  <button onclick="addRow()">행 추가</button>
  <button onclick="calculateAll()">계산하기</button>

  <script>
    function addRow() {
      const table = document.getElementById('dataTable').getElementsByTagName('tbody')[0];
      const newRow = table.insertRow();
      const expCell = newRow.insertCell(0);
      const theoCell = newRow.insertCell(1);
      const resultCell = newRow.insertCell(2);

      expCell.innerHTML = '<input type="number" step="any" class="exp">';
      theoCell.innerHTML = '<input type="number" step="any" class="theo">';
      resultCell.className = 'result';
    }

    function calculateAll() {
      const expInputs = document.querySelectorAll('.exp');
      const theoInputs = document.querySelectorAll('.theo');
      const results = document.querySelectorAll('.result');

      for (let i = 0; i < expInputs.length; i++) {
        const exp = parseFloat(expInputs[i].value);
        const theo = parseFloat(theoInputs[i].value);

        if (isNaN(exp) || isNaN(theo) || theo === 0) {
          results[i].innerText = "입력 오류";
        } else {
          const errorRate = Math.abs((exp - theo) / theo) * 100;
          results[i].innerText = errorRate.toPrecision(3);
        }
      }
    }
  </script>
</body>
</html>
